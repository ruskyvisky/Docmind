version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind-postgres
    restart: always
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind_pass
      POSTGRES_DB: docmind_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmind -d docmind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: docmind-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama: Docker container yerine Windows'ta kurulu Ollama kullanılıyor.
  # app servisi, host.docker.internal üzerinden Windows Ollama'ya bağlanır.
  # Bu sayede modellerin (llama3.1:8b, nomic-embed-text) yeniden indirilmesi gerekmez.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docmind-app
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=docmind
      - DB_PASSWORD=docmind_pass
      - DB_NAME=docmind_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # host.docker.internal → Docker container içinden Windows host'a erişim
      - OLLAMA_HOST=http://host.docker.internal:11434
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      # Linux Docker için gerekli (Windows/Mac'te otomatik gelir)
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  redis_data: